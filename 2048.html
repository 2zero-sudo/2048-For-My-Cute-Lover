<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="2zero 咖啡">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/190/190411.png"> <title>2zero 咖啡 - 皮克敏 2048</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* 這裡放之前的 2048 CSS 樣式 (省略以節省篇幅，建議直接貼上之前給你的皮克敏 2048 代碼) */
        body { font-family: sans-serif; background-color: #f1f8e9; touch-action: none; }
        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; background: #a5d6a7; padding: 8px; border-radius: 12px; }
        .tile { position: absolute; transition: 0.1s; }
        .tile-inner { width: 75px; height: 75px; background: white; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="flex flex-col items-center p-4">
    <div class="mt-10 mb-4 text-center">
        <h1 class="text-2xl font-bold text-green-800">2zero 二零咖啡花園</h1>
        <div id="score" class="text-4xl font-black text-green-900">0</div>
    </div>

    <div class="relative w-[340px] h-[340px] grid-container" id="game-board">
        </div>

    <div class="mt-6 flex space-x-4">
        <button onclick="undo()" class="bg-white px-6 py-2 rounded-full border-2 border-green-300 font-bold">反悔</button>
        <button onclick="setupGame()" class="bg-green-600 text-white px-6 py-2 rounded-full font-bold">重新</button>
    </div>

    <p class="mt-10 text-xs text-gray-400">請使用 Safari 並點選「加入主畫面」以獲得最佳 App 體驗</p>

    <script>
        /* 這裡放入之前的 2048 JavaScript 邏輯 */
    </script>
</body>
</html>
